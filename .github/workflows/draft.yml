name: "Draft"
on:
  push:
    branches:
      - master
      - main
    tags: ["v[0-9]+.[0-9]+.[0-9]??"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  NIGHTLY_BODY: ${{ github.event.release.body }}
  GITHUB_BRANCH_TAG_NAME: ${{ github.ref_name }}
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: 1
  SCCACHE_GHA_ENABLED: true
  RUSTC_WRAPPER: sccache
  PROJECT_NAME: chapterize

jobs:
  build:
    name: "Draft - ${{ matrix.target }}"
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          # Windows
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
          # macOS
          - os: macos-13
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: ./.github/actions/setup-rust
        with:
          target: ${{ matrix.target }}
          use-mold: "false"

      - name: Build chapterize
        shell: bash
        run: cargo build --release --locked --target "${{ matrix.target }}"

      - name: Pack release dir (with bundled ffmpeg)
        shell: bash
        run: |
          set -euo pipefail
          ARTIFACT_NAME="${{ env.PROJECT_NAME }}-${{ matrix.target }}-${{ env.GITHUB_BRANCH_TAG_NAME }}"
          mkdir -p "${ARTIFACT_NAME}"

          BIN_SRC="target/${{ matrix.target }}/release/${{ env.PROJECT_NAME }}"
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            BIN_SRC="${BIN_SRC}.exe"
          fi
          cp -f "${BIN_SRC}" "${ARTIFACT_NAME}/"

          cp -f README.md LICENSE "${ARTIFACT_NAME}/" 2>/dev/null || cp -f README.md "${ARTIFACT_NAME}/"
          [[ -f LICENSE ]] && cp -f LICENSE "${ARTIFACT_NAME}/"

          chmod +x scripts/fetch-ffmpeg.sh
          ./scripts/fetch-ffmpeg.sh "${{ matrix.target }}" "${ARTIFACT_NAME}"

          # Zip from inside the folder so paths are clean
          if command -v zip >/dev/null 2>&1; then
            (cd "${ARTIFACT_NAME}" && zip -r "../${ARTIFACT_NAME}.zip" .)
          else
            # Windows runners without zip: use PowerShell compress
            powershell.exe -NoProfile -Command \
              "Compress-Archive -Path '${ARTIFACT_NAME}\\*' -DestinationPath '${ARTIFACT_NAME}.zip' -Force"
          fi
          ls -lah "${ARTIFACT_NAME}.zip"
          ls -lah "${ARTIFACT_NAME}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}-${{ matrix.target }}-${{ env.GITHUB_BRANCH_TAG_NAME }}
          path: ${{ env.PROJECT_NAME }}-${{ matrix.target }}-${{ env.GITHUB_BRANCH_TAG_NAME }}.zip
          if-no-files-found: error
          compression-level: "9"

  draft:
    name: "Draft - draft"
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Draft release
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          draft: true
          files: |
            ${{ env.PROJECT_NAME }}-*
          generate_release_notes: true
          body: |
            ## Bundled tools
            Each zip contains:
            - `chapterize` (or `chapterize.exe`)
            - `ffmpeg` / `ffprobe` matched to the target arch
            - `README.md`, `LICENSE`, `FFMPEG_NOTICE.txt`
            - `third_party/ffmpeg/` upstream attribution

            FFmpeg is a **separate** program (LGPL static builds on Linux/Windows via BtbN; macOS via eugeneware/ffmpeg-static). Delete the bundled binaries anytime and use system installs on `PATH` instead.

  nightly:
    name: "Draft - nightly"
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Generate nightly body
        run: |
          echo 'NIGHTLY_BODY<<EOF' >> "$GITHUB_ENV"
          echo "From commit: ${GITHUB_SHA:0:8}" >> "$GITHUB_ENV"
          echo "Generated on: $(date -u +"%Y-%m-%d %H:%M") UTC" >> "$GITHUB_ENV"
          echo "" >> "$GITHUB_ENV"
          echo "Zips include chapterize + arch-matched ffmpeg/ffprobe." >> "$GITHUB_ENV"
          echo "EOF" >> "$GITHUB_ENV"

      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Update the tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag --force nightly && git push --force origin tag nightly

      - name: Release Nightly
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          prerelease: true
          fail_on_unmatched_files: true
          files: |
            ${{ env.PROJECT_NAME }}-*
          name: Nightly Build
          body: ${{ env.NIGHTLY_BODY }}
          target_commitish: ${{ github.sha }}
